<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Archive</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="bg-symbols"></div>

    <nav>
        <div class="logo">VORTEX ARCHIVE</div>
        <div class="nav-links">
            <a href="archive.html">Archive</a>
            <a href="#">Oracle</a>
            <a href="#">New</a>
            <a href="#">About</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <div class="tagline">Tell us how you feel. We find what to play.</div>
            
            <div class="oracle-container">
                <form id="oracle-form">
                    <div class="oracle-input-wrapper">
                        <span class="oracle-dot"></span>
                        <input type="text" id="oracle-input" placeholder="describe a feeling, a mood, a moment..." autocomplete="off">
                    </div>
                </form>

                <div class="hint-chips">
                    <span class="chip">dark & heavy</span>
                    <span class="chip">quick break</span>
                    <span class="chip">decompress</span>
                    <span class="chip">miyazaki vibe</span>
                    <span class="chip">emotional</span>
                </div>

                <div id="oracle-response"></div>
            </div>
        </section>

        <section id="featured">
            <div class="section-head">
                <h2>Featured in the Archive</h2>
                <a href="archive.html" class="nav-link" style="font-size: 0.7rem; color: var(--accent);">View full list →</a>
            </div>
            <div class="game-grid" id="featured-list">
                <!-- Injected via JS -->
            </div>
        </section>
    </main>

    <footer>
        <p class="curator-note">A CURATOR, NOT A STORE</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
